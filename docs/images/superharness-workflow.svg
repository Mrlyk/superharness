<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0,0.5 L 9,3.5 L 0,6.5" fill="#94A3B8"/>
    </marker>
    <marker id="arrowFail" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0,0.5 L 9,3.5 L 0,6.5" fill="#C05A3A"/>
    </marker>
    <marker id="arrowHook" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0,0.5 L 9,3.5 L 0,6.5" fill="#6B5B95"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="#FAFBFC" rx="4"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A2332">Superharness 工作流全景</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#6B7280">用户视角 · 从需求到交付的每一步技术细节</text>

  <!-- ==================== Hook 注入机制（右侧竖条） ==================== -->
  <rect x="890" y="72" width="50" height="680" rx="5" fill="#6B5B95"/>
  <text x="915" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF" transform="rotate(90,915,330)">Hook 上下文注入</text>
  <text x="915" y="490" text-anchor="middle" font-size="9" fill="#D0C8E8" transform="rotate(90,915,490)">SessionStart · PreToolUse · SubagentStop</text>

  <!-- ==================== Step 1: Session Start ==================== -->
  <rect x="30" y="72" width="840" height="80" rx="6" fill="#F0EEF8" stroke="#6B5B95" stroke-width="1.5"/>
  <rect x="30" y="72" width="5" height="80" rx="2" fill="#6B5B95"/>

  <text x="52" y="96" font-size="14" font-weight="bold" fill="#6B5B95">会话启动</text>
  <text x="52" y="112" font-size="10" fill="#8B7BB5">SessionStart hook 自动触发，无需用户操作</text>

  <rect x="240" y="84" width="200" height="28" rx="4" fill="#6B5B95"/>
  <text x="340" y="103" text-anchor="middle" font-size="10" fill="#FFFFFF">注入 using-superharness 调度协议</text>

  <rect x="450" y="84" width="180" height="28" rx="4" fill="#6B5B95"/>
  <text x="540" y="103" text-anchor="middle" font-size="10" fill="#FFFFFF">注入 spec/index.md 摘要</text>

  <rect x="640" y="84" width="210" height="28" rx="4" fill="#6B5B95"/>
  <text x="745" y="103" text-anchor="middle" font-size="10" fill="#FFFFFF">检测未完成任务 → 恢复提示</text>

  <rect x="240" y="118" width="610" height="24" rx="4" fill="#E8E4F0"/>
  <text x="545" y="135" text-anchor="middle" font-size="9" fill="#6B5B95">产物：AI 获得项目规范 + 铁律 + skill 调度规则 + 当前任务状态，无需用户手动加载</text>

  <!-- Hook connection line -->
  <line x1="870" y1="112" x2="890" y2="112" stroke="#6B5B95" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow -->
  <line x1="450" y1="152" x2="450" y2="168" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Step 2: Brainstorm ==================== -->
  <rect x="30" y="174" width="840" height="105" rx="6" fill="#F0F7F4" stroke="#2E7D5B" stroke-width="1.5"/>
  <rect x="30" y="174" width="5" height="105" rx="2" fill="#2E7D5B"/>

  <text x="52" y="198" font-size="14" font-weight="bold" fill="#2E7D5B">1. 头脑风暴</text>
  <text x="52" y="212" font-size="10" fill="#4A7A60">brainstorm skill · 用户参与阶段</text>

  <rect x="240" y="186" width="130" height="36" rx="5" fill="#2E7D5B"/>
  <text x="305" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">spec-discover</text>
  <text x="305" y="215" text-anchor="middle" font-size="8" fill="#C0E8D0">扫描代码 → spec</text>

  <line x1="374" y1="204" x2="388" y2="204" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="392" y="186" width="130" height="36" rx="5" fill="#2E7D5B"/>
  <text x="457" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">逐个问题澄清</text>
  <text x="457" y="215" text-anchor="middle" font-size="8" fill="#C0E8D0">multiple choice 优先</text>

  <line x1="526" y1="204" x2="540" y2="204" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="544" y="186" width="140" height="36" rx="5" fill="#2E7D5B"/>
  <text x="614" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">提出 2-3 种方案</text>
  <text x="614" y="215" text-anchor="middle" font-size="8" fill="#C0E8D0">推荐 + 权衡分析</text>

  <line x1="688" y1="204" x2="702" y2="204" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="706" y="186" width="140" height="36" rx="5" fill="#2E7D5B"/>
  <text x="776" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">用户确认设计</text>
  <text x="776" y="215" text-anchor="middle" font-size="8" fill="#C0E8D0">HARD-GATE</text>

  <rect x="240" y="230" width="130" height="24" rx="4" fill="#3D9B6E"/>
  <text x="305" y="247" text-anchor="middle" font-size="9" fill="#FFFFFF">mindmap 实时可视化</text>

  <rect x="380" y="230" width="200" height="24" rx="4" fill="#3D9B6E"/>
  <text x="480" y="247" text-anchor="middle" font-size="9" fill="#FFFFFF">写入 prd.md + task.json + contract.md</text>

  <rect x="590" y="230" width="180" height="24" rx="4" fill="#3D9B6E"/>
  <text x="680" y="247" text-anchor="middle" font-size="9" fill="#FFFFFF">Spec self-review → 用户审阅</text>

  <rect x="240" y="260" width="610" height="14" rx="3" fill="#E8F5EE"/>
  <text x="545" y="270" text-anchor="middle" font-size="8" fill="#4A7A60">产物：.superharness/tasks/{task}/prd.md · task.json · contract.md · trace.jsonl（brainstorm:start）</text>

  <!-- Arrow -->
  <line x1="450" y1="279" x2="450" y2="295" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Step 3: Planning ==================== -->
  <rect x="30" y="301" width="840" height="75" rx="6" fill="#F0F7F4" stroke="#2E7D5B" stroke-width="1.5"/>
  <rect x="30" y="301" width="5" height="75" rx="2" fill="#2E7D5B"/>

  <text x="52" y="325" font-size="14" font-weight="bold" fill="#2E7D5B">2. 任务拆解</text>
  <text x="52" y="339" font-size="10" fill="#4A7A60">writing-plans skill · 自动执行</text>

  <rect x="240" y="313" width="160" height="28" rx="4" fill="#2E7D5B"/>
  <text x="320" y="332" text-anchor="middle" font-size="10" fill="#FFFFFF">bite-sized 任务拆分</text>

  <rect x="410" y="313" width="160" height="28" rx="4" fill="#2E7D5B"/>
  <text x="490" y="332" text-anchor="middle" font-size="10" fill="#FFFFFF">JSONL 上下文文件生成</text>

  <rect x="580" y="313" width="160" height="28" rx="4" fill="#2E7D5B"/>
  <text x="660" y="332" text-anchor="middle" font-size="10" fill="#FFFFFF">Sprint Contract 细化</text>

  <rect x="240" y="349" width="500" height="20" rx="3" fill="#E8F5EE"/>
  <text x="490" y="363" text-anchor="middle" font-size="8" fill="#4A7A60">产物：plan.md · implement.jsonl · check.jsonl · debug.jsonl（PreToolUse hook 读取并注入子 agent）</text>

  <!-- Arrow -->
  <line x1="450" y1="376" x2="450" y2="392" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hook connection -->
  <line x1="870" y1="334" x2="890" y2="334" stroke="#6B5B95" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ==================== Step 4: Worktree + TDD ==================== -->
  <rect x="30" y="398" width="840" height="95" rx="6" fill="#EEF2FA" stroke="#2A5A82" stroke-width="1.5"/>
  <rect x="30" y="398" width="5" height="95" rx="2" fill="#2A5A82"/>

  <text x="52" y="422" font-size="14" font-weight="bold" fill="#2A5A82">3-4. 隔离开发 + TDD 实现</text>
  <text x="52" y="436" font-size="10" fill="#5A7A96">using-git-worktrees + subagent-driven-development · 自动执行</text>

  <rect x="240" y="410" width="120" height="36" rx="5" fill="#2A5A82"/>
  <text x="300" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">创建 worktree</text>
  <text x="300" y="439" text-anchor="middle" font-size="8" fill="#C0D8F0">隔离分支</text>

  <line x1="364" y1="428" x2="378" y2="428" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="382" y="410" width="150" height="36" rx="5" fill="#2A5A82"/>
  <text x="457" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">dispatch implement</text>
  <text x="457" y="439" text-anchor="middle" font-size="8" fill="#C0D8F0">每任务新鲜 subagent</text>

  <line x1="536" y1="428" x2="550" y2="428" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="554" y="410" width="140" height="36" rx="5" fill="#2A5A82"/>
  <text x="624" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RED → GREEN</text>
  <text x="624" y="439" text-anchor="middle" font-size="8" fill="#C0D8F0">TDD Iron Law</text>

  <line x1="698" y1="428" x2="712" y2="428" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="716" y="410" width="130" height="36" rx="5" fill="#2A5A82"/>
  <text x="781" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">REFACTOR</text>
  <text x="781" y="439" text-anchor="middle" font-size="8" fill="#C0D8F0">commit 提交</text>

  <rect x="240" y="454" width="606" height="14" rx="3" fill="#E8EFF8"/>
  <text x="543" y="464" text-anchor="middle" font-size="8" fill="#5A7A96">PreToolUse hook 自动注入 implement.jsonl 上下文 → subagent 获得 spec + prd + 相关文件内容，无需手动拼 prompt</text>

  <rect x="240" y="473" width="606" height="14" rx="3" fill="#E8EFF8"/>
  <text x="543" y="483" text-anchor="middle" font-size="8" fill="#5A7A96">产物：代码实现 + 测试文件 + git commit（在 worktree 隔离分支上）</text>

  <!-- Hook connection -->
  <line x1="870" y1="440" x2="890" y2="440" stroke="#6B5B95" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow -->
  <line x1="450" y1="493" x2="450" y2="509" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Step 5: Two-stage Review ==================== -->
  <rect x="30" y="515" width="840" height="85" rx="6" fill="#FFF8F0" stroke="#C07A3A" stroke-width="1.5"/>
  <rect x="30" y="515" width="5" height="85" rx="2" fill="#C07A3A"/>

  <text x="52" y="539" font-size="14" font-weight="bold" fill="#C07A3A">5. 双阶段审查</text>
  <text x="52" y="553" font-size="10" fill="#B8846A">check agent · SubagentStop hook（Ralph Loop）</text>

  <rect x="240" y="527" width="180" height="36" rx="5" fill="#C07A3A"/>
  <text x="330" y="544" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Spec 合规审查</text>
  <text x="330" y="556" text-anchor="middle" font-size="8" fill="#F0DCC0">dispatch check · spec-reviewer</text>

  <line x1="424" y1="545" x2="438" y2="545" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="442" y="527" width="180" height="36" rx="5" fill="#C07A3A"/>
  <text x="532" y="544" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">代码质量审查</text>
  <text x="532" y="556" text-anchor="middle" font-size="8" fill="#F0DCC0">dispatch check · code-reviewer</text>

  <line x1="626" y1="545" x2="640" y2="545" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="644" y="527" width="200" height="36" rx="5" fill="#C07A3A"/>
  <text x="744" y="544" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">Ralph Loop 验证</text>
  <text x="744" y="556" text-anchor="middle" font-size="8" fill="#F0DCC0">SubagentStop hook · max 5 轮</text>

  <rect x="240" y="571" width="604" height="20" rx="3" fill="#FFF3E8"/>
  <text x="542" y="585" text-anchor="middle" font-size="8" fill="#B8846A">PreToolUse hook 注入 check.jsonl 上下文 · SubagentStop hook 阻止 check agent 过早声明完成 · 不通过 → implement agent 修复 → 重新审查</text>

  <!-- Fail loop back to Step 4 -->
  <path d="M 56,515 C 56,505 56,468 56,448 C 56,428 80,418 120,418" fill="none" stroke="#C05A3A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowFail)"/>
  <text x="68" y="475" font-size="9" fill="#C05A3A" transform="rotate(-90,68,475)">不通过 → 修复</text>

  <!-- Hook connection -->
  <line x1="870" y1="550" x2="890" y2="550" stroke="#6B5B95" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow -->
  <line x1="450" y1="600" x2="450" y2="616" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="612" font-size="10" font-weight="bold" fill="#2E7D5B">pass</text>

  <!-- ==================== Step 6: QA ==================== -->
  <rect x="30" y="622" width="840" height="68" rx="6" fill="#FDF2F2" stroke="#9B3A3A" stroke-width="1.5"/>
  <rect x="30" y="622" width="5" height="68" rx="2" fill="#9B3A3A"/>

  <text x="52" y="646" font-size="14" font-weight="bold" fill="#9B3A3A">6. QA 验收（可选）</text>
  <text x="52" y="660" font-size="10" fill="#B86A6A">sh-qa / sh-fix skill · 外部服务</text>

  <rect x="240" y="634" width="190" height="28" rx="4" fill="#9B3A3A"/>
  <text x="335" y="653" text-anchor="middle" font-size="10" fill="#FFFFFF">托管模式 / 自治模式</text>

  <rect x="440" y="634" width="160" height="28" rx="4" fill="#9B3A3A"/>
  <text x="520" y="653" text-anchor="middle" font-size="10" fill="#FFFFFF">qa-issues.json</text>

  <rect x="610" y="634" width="240" height="28" rx="4" fill="#9B3A3A"/>
  <text x="730" y="653" text-anchor="middle" font-size="10" fill="#FFFFFF">sh-fix TDD 修复 · max 3 轮 · 防振荡</text>

  <rect x="240" y="668" width="610" height="14" rx="3" fill="#FDF0F0"/>
  <text x="545" y="678" text-anchor="middle" font-size="8" fill="#B86A6A">产物：qa-report.md · qa-issues.json · 回归检测 → 超限升级为人工介入</text>

  <!-- QA fail loop back to Step 4 -->
  <path d="M 42,622 C 42,570 42,468 42,448 C 42,420 80,410 130,410" fill="none" stroke="#C05A3A" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowFail)"/>
  <text x="24" y="530" font-size="9" fill="#C05A3A" transform="rotate(-90,24,530)">QA fail → sh-fix → 重跑</text>

  <!-- Arrow -->
  <line x1="450" y1="690" x2="450" y2="706" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== Step 7: Merge ==================== -->
  <rect x="30" y="712" width="840" height="44" rx="6" fill="#F0F7F4" stroke="#2E7D5B" stroke-width="1.5"/>
  <rect x="30" y="712" width="5" height="44" rx="2" fill="#2E7D5B"/>

  <text x="52" y="740" font-size="14" font-weight="bold" fill="#2E7D5B">7. 合并完成</text>

  <rect x="240" y="722" width="140" height="24" rx="4" fill="#2E7D5B"/>
  <text x="310" y="739" text-anchor="middle" font-size="9" fill="#FFFFFF">生成 trace-summary.md</text>

  <rect x="390" y="722" width="200" height="24" rx="4" fill="#2E7D5B"/>
  <text x="490" y="739" text-anchor="middle" font-size="9" fill="#FFFFFF">merge/PR/keep/discard 四选一</text>

  <rect x="600" y="722" width="140" height="24" rx="4" fill="#2E7D5B"/>
  <text x="670" y="739" text-anchor="middle" font-size="9" fill="#FFFFFF">清理 worktree</text>

  <rect x="750" y="722" width="100" height="24" rx="4" fill="#2E7D5B"/>
  <text x="800" y="739" text-anchor="middle" font-size="9" fill="#FFFFFF">task → completed</text>

  <!-- ==================== LEGEND ==================== -->
  <line x1="30" y1="770" x2="870" y2="770" stroke="#E5E7EB" stroke-width="1"/>

  <g transform="translate(50, 790)">
    <rect x="0" y="2" width="16" height="14" rx="3" fill="#2E7D5B"/>
    <text x="22" y="13" font-size="11" fill="#4A5568">编排阶段</text>

    <rect x="100" y="2" width="16" height="14" rx="3" fill="#2A5A82"/>
    <text x="122" y="13" font-size="11" fill="#4A5568">TDD 实现</text>

    <rect x="200" y="2" width="16" height="14" rx="3" fill="#C07A3A"/>
    <text x="222" y="13" font-size="11" fill="#4A5568">审查反馈</text>

    <rect x="300" y="2" width="16" height="14" rx="3" fill="#9B3A3A"/>
    <text x="322" y="13" font-size="11" fill="#4A5568">QA 验收</text>

    <rect x="400" y="2" width="16" height="14" rx="3" fill="#6B5B95"/>
    <text x="422" y="13" font-size="11" fill="#4A5568">Hook 注入</text>

    <line x1="510" y1="9" x2="546" y2="9" stroke="#C05A3A" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="554" y="13" font-size="11" fill="#4A5568">不通过 → 返工</text>

    <line x1="670" y1="9" x2="706" y2="9" stroke="#6B5B95" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="714" y="13" font-size="11" fill="#4A5568">上下文注入</text>
  </g>

</svg>
